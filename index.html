<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LoveLore</title>
    <meta name="description" content="A private world for us">
    <meta name="theme-color" content="#FFF5F3">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ============ LOGIN SCREEN ============ -->
    <div id="loginScreen" class="screen">
        <div class="login-bg-hearts"></div>
        <div class="login-container">
            <div class="login-brand">
                <div class="brand-heart"><i class="fas fa-heart"></i></div>
                <h1 class="brand-title">LoveLore</h1>
                <p class="brand-subtitle">Our private world</p>
            </div>

            <!-- Avatar Selection -->
            <div id="avatarSection" class="avatar-section">
                <p class="avatar-label">Who are you?</p>
                <div class="avatar-options">
                    <button class="avatar-btn avatar-a" data-user="A">
                        <span class="avatar-letter">A</span>
                    </button>
                    <div class="avatar-heart-connector">
                        <i class="fas fa-heart"></i>
                    </div>
                    <button class="avatar-btn avatar-p" data-user="P">
                        <span class="avatar-letter">P</span>
                    </button>
                </div>
            </div>

            <!-- Password Section (appears after selecting user) -->
            <div id="passwordSection" class="password-section">
                <!-- Set Password (first time) -->
                <div id="setPasswordForm" class="auth-form" style="display:none">
                    <div class="auth-header">
                        <div id="setPassAvatar" class="mini-avatar">A</div>
                        <p class="auth-title">Set your password</p>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="newPassword" placeholder="Password" class="input-field" autocomplete="new-password">
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="confirmPassword" placeholder="Confirm password" class="input-field" autocomplete="new-password">
                    </div>
                    <p id="setPassError" class="auth-error" style="display:none"></p>
                    <button id="setPasswordBtn" class="btn-primary">
                        <i class="fas fa-arrow-right"></i> Set Password
                    </button>
                </div>

                <!-- Login (returning user) -->
                <div id="loginForm" class="auth-form" style="display:none">
                    <div class="auth-header">
                        <div id="loginAvatar" class="mini-avatar">A</div>
                        <p class="auth-title">Welcome back, <span id="loginUserName">A</span></p>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" id="loginPassword" placeholder="Password" class="input-field" autocomplete="current-password">
                    </div>
                    <p id="loginError" class="auth-error" style="display:none"></p>
                    <button id="loginBtn" class="btn-primary">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                </div>

                <button id="backToAvatar" class="btn-back">
                    <i class="fas fa-arrow-left"></i> Back
                </button>
            </div>
        </div>
    </div>

    <!-- ============ MAIN APP ============ -->
    <div id="mainApp" class="screen" style="display:none">

        <!-- Top Bar -->
        <header class="top-bar">
            <div class="top-bar-left">
                <i class="fas fa-heart top-bar-heart"></i>
                <h1 class="top-bar-title">LoveLore</h1>
            </div>
            <div class="top-bar-right">
                <span id="syncDot" class="sync-dot synced" title="Synced"></span>
                <button id="logoutBtn" class="top-bar-btn" title="Logout">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </header>

        <!-- Feed Screen -->
        <div id="feedScreen" class="app-screen active">
            <!-- Anniversary Banner -->
            <div id="anniversaryBanner" class="anniversary-banner" style="display:none">
                <div class="anni-bg-hearts">
                    <span class="anni-float-heart" style="left:8%;top:15%;animation-delay:0s"><i class="fas fa-heart"></i></span>
                    <span class="anni-float-heart" style="left:85%;top:25%;animation-delay:1.5s"><i class="fas fa-heart"></i></span>
                    <span class="anni-float-heart" style="left:45%;top:70%;animation-delay:3s"><i class="fas fa-heart"></i></span>
                    <span class="anni-float-heart" style="left:20%;top:80%;animation-delay:4.2s"><i class="fas fa-heart"></i></span>
                    <span class="anni-float-heart" style="left:72%;top:10%;animation-delay:2s"><i class="fas fa-heart"></i></span>
                </div>
                <div class="anni-content">
                    <div class="anni-names">A <i class="fas fa-heart anni-heart-icon"></i> P</div>
                    <div class="anni-counter">
                        <span class="anni-number" id="anniDays">0</span>
                        <span class="anni-label">days together</span>
                    </div>
                    <div class="anni-date" id="anniDate">Since forever</div>
                </div>
            </div>

            <div id="postsContainer" class="posts-container">
                <!-- Posts rendered here by JS -->
            </div>
            <div id="emptyFeed" class="empty-state">
                <div class="empty-icon"><i class="fas fa-heart"></i></div>
                <p class="empty-title">No posts yet</p>
                <p class="empty-sub">Tap <i class="fas fa-plus"></i> to share your first moment</p>
            </div>
            <div id="feedLoader" class="feed-loader" style="display:none">
                <div class="spinner"></div>
            </div>
        </div>

        <!-- Profile Screen -->
        <div id="profileScreen" class="app-screen" style="display:none">
            <div id="profileContent" class="profile-content">
                <!-- Rendered by JS -->
            </div>
        </div>

        <!-- FAB -->
        <button id="fabCreate" class="fab" title="New Post">
            <i class="fas fa-plus"></i>
        </button>

        <!-- Bottom Nav -->
        <nav class="bottom-nav">
            <button class="nav-btn active" data-screen="feedScreen">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </button>
            <button class="nav-btn" data-screen="profileScreen">
                <i class="fas fa-user"></i>
                <span>Me</span>
            </button>
        </nav>
    </div>

    <!-- ============ CREATE POST MODAL ============ -->
    <div id="createPostModal" class="modal-overlay" style="display:none">
        <div class="modal-sheet create-post-modal">
            <div class="modal-handle"></div>
            <div class="modal-header">
                <h2>New Post</h2>
                <button class="modal-close" id="closeCreatePost"><i class="fas fa-times"></i></button>
            </div>
            <div class="create-post-body">
                <div class="create-post-user">
                    <div id="createPostAvatar" class="mini-avatar">A</div>
                    <span id="createPostUser">A</span>
                </div>
                <textarea id="postText" placeholder="What's on your mind..." class="post-textarea" rows="4"></textarea>
                <div id="imagePreview" class="image-preview" style="display:none">
                    <img id="previewImg" src="" alt="Preview">
                    <button class="remove-image" id="removeImage"><i class="fas fa-times-circle"></i></button>
                </div>
                <div class="post-attach-bar">
                    <label class="attach-btn" for="imageInput">
                        <i class="fas fa-image"></i>
                        <span>Photo</span>
                    </label>
                    <input type="file" id="imageInput" accept="image/*" style="display:none">
                </div>
            </div>
            <button id="postBtn" class="btn-primary btn-post" disabled>
                <i class="fas fa-paper-plane"></i> Post
            </button>
        </div>
    </div>

    <!-- ============ COMMENTS MODAL ============ -->
    <div id="commentsModal" class="modal-overlay" style="display:none">
        <div class="modal-sheet comments-modal">
            <div class="modal-handle"></div>
            <div class="modal-header">
                <h2>Comments</h2>
                <button class="modal-close" id="closeComments"><i class="fas fa-times"></i></button>
            </div>
            <div id="commentsList" class="comments-list">
                <div class="comments-empty">
                    <p>No comments yet. Say something sweet!</p>
                </div>
            </div>
            <div class="comment-input-bar">
                <div id="commentAvatar" class="mini-avatar tiny">A</div>
                <input type="text" id="commentInput" placeholder="Add a comment..." class="comment-input" maxlength="500">
                <button id="sendComment" class="comment-send" disabled><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <!-- ============ IMAGE VIEWER ============ -->
    <div id="imageViewer" class="image-viewer" style="display:none">
        <button class="viewer-close" id="closeViewer"><i class="fas fa-times"></i></button>
        <img id="viewerImg" src="" alt="">
    </div>

    <!-- ============ TOAST ============ -->
    <div id="toast" class="toast" style="display:none"></div>

    <!-- ============ DOUBLE-TAP HEART ============ -->
    <div id="doubleTapHeart" class="double-tap-heart" style="display:none">
        <i class="fas fa-heart"></i>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

    <!-- App -->
    <script src="app.js"></script>
</body>
</html>
